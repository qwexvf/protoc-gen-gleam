name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '27.x'

      - name: Install Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          gleam-version: '1.x'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Golden file check
        run: |
          UPDATE_GOLDEN=1 go test ./internal/generator/ -run TestGenerateScanProto
          git diff --exit-code testdata/golden/
